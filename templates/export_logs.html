<!doctype html>
<html>
<head>
<title>Export Logs</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-4">

<h3>Export Logs (Date wise)</h3>

<form method="get" action="/export_logs" class="mb-3">

    <label>Select Date</label>
    <input type="date"
           name="date"
           value="{{ selected_date }}"
           class="form-control mb-2">

    <button class="btn btn-primary">Show</button>

</form>
{% if rows %}

<table class="table table-bordered mt-4">
    <thead>
        <tr>
            <th>Enrollment No</th>
            <th>Status</th>
            <th>Action Time</th>
        </tr>
    </thead>
    <tbody>
    {% for r in rows %}
        <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>

{% else %}
<p class="mt-4 text-danger">No logs found for selected date.</p>
{% endif %}

<a class="btn btn-success"
   href="/export_logs_file?date={{ selected_date }}">
   Download Excel
</a>

<br><br>
<a href="/warden" class="btn btn-secondary">Back</a>

</div>
</body>
</html>
