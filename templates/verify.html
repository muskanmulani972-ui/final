<!DOCTYPE html>
<html>
<head>
<title>College Entry Exit</title>
<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#e3f2fd,#ffffff);
}

/* Header */
.header{
    background:#0d47a1;
    color:white;
    padding:20px;
    text-align:center;
    font-size:26px;
    font-weight:600;
    position:relative;
}

/* Add Student Button */
.add-btn{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    background:white;
    color:#0d47a1;
    padding:8px 18px;
    border-radius:25px;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    transition:0.3s;
}

.add-btn:hover{
    background:#e3f2fd;
    transform:translateY(-50%) scale(1.05);
}

/* Card */
.card{
    max-width:850px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
    text-align:center;
}

video{
    width:100%;
    max-width:650px;
    border-radius:16px;
    border:4px solid #0d47a1;
}

button{
    margin-top:25px;
    padding:14px 40px;
    font-size:18px;
    background:#0d47a1;
    color:white;
    border:none;
    border-radius:30px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#08306b;
}

.dashboard-link{
    display:block;
    margin-top:20px;
    color:#0d47a1;
    font-weight:600;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="header">
    🎓 College Entry / Exit System

    <a href="{{ url_for('add_student') }}" class="add-btn">
        ➕ Add New Student
    </a>
</div>

<div class="card">
    <video id="v" autoplay playsinline></video>
    <br>
    <button onclick="scan()">Scan Face</button>
    <a href="/dashboard">Admin Dashboard</a>
</div>

<script>

async function startCamera() {
    try {

        // First permission request
        await navigator.mediaDevices.getUserMedia({ video: true });

        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(d => d.kind === "videoinput");

        console.log("Available Cameras:", videoDevices);

        let laptopCam = null;

        for (let device of videoDevices) {
            const name = device.label.toLowerCase();

            // Ignore phone / virtual cameras
            if (
                !name.includes("android") &&
                !name.includes("iphone") &&
                !name.includes("phone") &&
                !name.includes("virtual")
            ) {
                laptopCam = device;
                break;
            }
        }

        // fallback if not found
        if (!laptopCam && videoDevices.length > 0) {
            laptopCam = videoDevices[0];
        }

        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                deviceId: laptopCam ? { exact: laptopCam.deviceId } : undefined
            }
        });

        document.getElementById("v").srcObject = stream;

    } catch (err) {
        alert("Camera Error: " + err);
        console.error(err);
    }
}

startCamera();


function scan(){
 let v=document.getElementById("v");
 let c=document.createElement("canvas");
 c.width=v.videoWidth; 
 c.height=v.videoHeight;
 c.getContext("2d").drawImage(v,0,0);

 c.toBlob(b=>{
  let f=new FormData(); 
  f.append("frame",b);

  fetch("/verify1",{method:"POST",body:f})
  .then(r=>r.text()).then(t=>{
    document.open(); 
    document.write(t); 
    document.close();
  });
 });
}

</script>

</body>
</html>
