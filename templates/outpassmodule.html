<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Outpass Modules</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
    background-image: url("{{ url_for('static', filename='college_bgg.jpeg') }}");
    margin:0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background-color: #f5f5f5;
}

/* ---------- NAV BAR ---------- */
.navbar {
    background:#002b5c;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:20px;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:17px;
}

.navbar a:hover{
    text-decoration:underline;
}

/* ---------- HEADING ---------- */
.hero{
    text-align:center;
    margin-top:70px;
}

.hero h1{
    font-size:42px;
    color:#002b5c;
    margin-bottom:8px;
    font-weight:800;
}

.hero p{
    color:#666;
    font-size:17px;
}

/* ---------- MODULE CARDS ---------- */
.modules{
    margin-top:40px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:40px;
}

.card{
    background:white;
    width:340px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 6px 18px rgba(0,0,0,0.2);
    transition:0.3s;
    text-align:center;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.material-icons{
    font-size:60px;
    color:#002b5c;
}

.card h2{
    margin-top:10px;
    color:#002b5c;
}

/* ---------- BUTTON ---------- */
.btn{
    display:inline-block;
    margin-top:18px;
    padding:10px 22px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
    color:white;
}

.student{ background:#ff8c00; }
.warden{ background:#007bff; }
.guard{ background:#28a745; }

.btn:hover{
    opacity:0.9;
}

/* ---------- FOOTER ---------- */
footer{
    margin-top:80px;
    padding:15px;
    background:#002b5c;
    color:white;
    text-align:center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div><b>College Management System</b></div>
    <div>
        <a href="/modules">Home</a>
        <a href="/logout" style="color:#ffb3b3">Logout</a>
    </div>
</div>

<!-- TITLE -->
<section class="hero">
    <h1>Outpass Modules</h1>
    <p>Choose the module you want to access</p>
</section>

<!-- MODULE CARDS -->
<section class="modules">

    <!-- STUDENT -->
    <div class="card" onclick="location.href='/student_module'">
        <span class="material-icons">person</span>
        <h2>Student Module</h2>
        <a href="/student_module" class="btn student">OPEN</a>
    </div>

    <!-- WARDEN -->
    <div class="card" onclick="location.href='/hod_intermediate'">
        <span class="material-icons">supervisor_account</span>
        <h2>Warden Module</h2>
        <a href="/hod_intermediate" class="btn warden">OPEN</a>
    </div>

    <!-- GUARD -->
    <div class="card" onclick="location.href='/WARDEN_intermediate'">
        <span class="material-icons">security</span>
        <h2>Guard Module</h2>
        <a href="/WARDEN_intermediate" class="btn guard">OPEN</a>
    </div>

</section>

<footer>
    Streamlining Student Management & Campus Security!
</footer>

</body>
</html>
